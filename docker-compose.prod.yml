# Production deployment
version: '3.9'

services:
  web:
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  celery:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  bot:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
